name: Build Debug

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Read module version
        id: version
        shell: bash
        run: |
          version="$(grep '^version=' app/src/main/resources/META-INF/xposed/module.prop | cut -d= -f2)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Verify and build Debug APK
        run: ./gradlew verifyArchitecture lintDebug assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CWMHook-v${{ steps.version.outputs.version }}-debug
          path: app/build/outputs/apk/debug/CWMHook-v${{ steps.version.outputs.version }}-debug.apk
          retention-days: 30
